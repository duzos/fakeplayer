name: Publish (CurseForge only)

on:
  workflow_dispatch:

jobs:
  fabric:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Fabric
        run: ./gradlew -p fabric build

      - name: Publish Fabric to CurseForge
        run: ./gradlew :fabric:publishCurseforge
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}

  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Restore DataGen cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: forge/src/generated
          key: datagen-${{ github.run_id }}
          restore-keys:
            datagen-

      - name: Run DataGen
        run: ./gradlew -p forge Data
        continue-on-error: true

      - name: Save DataGen cache
        uses: actions/cache/save@v4
        with:
          path: forge/src/generated
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Build Forge
        run: ./gradlew -p forge build

      - name: Publish NeoForge to CurseForge
        run: ./gradlew :forge:publishCurseforge
        env:
          CURSEFORGE_TOKEN: ${{ secrets.CURSEFORGE_TOKEN }}
