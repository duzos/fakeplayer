name: Sync gallery (Modrinth)

# Syncs the Modrinth gallery to match docs/img/ + docs/gallery.json.
# The existing gallery entries are cleared first, then every image in docs/img/
# is uploaded; docs/gallery.json optionally adds a title / description / featured
# flag / ordering per filename. Clearing before uploading keeps re-runs safe -
# Modrinth rejects re-uploading an unchanged image as a duplicate, so the old
# copies have to go before the new ones land. The gallery always ends up matching
# docs/img/ exactly - adding, replacing and removing images all just work.
#
# Runs manually, or on a push to master whose commit message contains [deploy].
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - docs/gallery.json
      - docs/img/**

jobs:
  sync:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Sync docs/img to the Modrinth gallery
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          set -euo pipefail
          PID=1RSY6DQH
          API=https://api.modrinth.com/v2
          MANIFEST=docs/gallery.json
          [ -f "$MANIFEST" ] || MANIFEST=

          content_type() {
            case "$1" in
              png) echo image/png ;;
              jpg|jpeg) echo image/jpeg ;;
              webp) echo image/webp ;;
              gif) echo image/gif ;;
              *) echo application/octet-stream ;;
            esac
          }

          meta() { # meta <filename> <jq-filter> <default>
            local v=""
            if [ -n "$MANIFEST" ]; then
              v=$(jq -r --arg n "$1" "(.[\$n] // {}) | $2 // empty" "$MANIFEST" 2>/dev/null || true)
            fi
            [ -n "$v" ] && echo "$v" || echo "$3"
          }

          # 1. Clear the current gallery first. Modrinth dedupes by image content,
          #    so an unchanged image can't be re-uploaded while its old copy is still there.
          existing=$(curl -fsSL "$API/project/$PID" | jq -r '.gallery[]?.url')
          if [ -n "$existing" ]; then
            while IFS= read -r u; do
              [ -z "$u" ] && continue
              eu=$(jq -rn --arg v "$u" '$v|@uri')
              code=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE "$API/project/$PID/gallery?url=$eu" \
                -H "Authorization: $MODRINTH_TOKEN")
              echo "Removed old entry (HTTP $code)"
            done <<< "$existing"
          fi

          # 2. Upload every image in docs/img/, ordered by the manifest's "ordering".
          shopt -s nullglob
          files=(docs/img/*.png docs/img/*.jpg docs/img/*.jpeg docs/img/*.webp docs/img/*.gif)
          if [ ${#files[@]} -eq 0 ]; then echo "::error::no images in docs/img/"; exit 1; fi

          # sort files by ordering (manifest) then name
          sorted=$(for f in "${files[@]}"; do
            n=$(basename "$f"); echo "$(meta "$n" '.ordering' 9999)|$f"
          done | sort -t'|' -k1,1n -k2 | cut -d'|' -f2-)

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            name=$(basename "$file")
            ext="${name##*.}"; ext="${ext,,}"
            title=$(meta "$name" '.title' "${name%.*}")
            desc=$(meta "$name" '.description' "")
            featured=$(meta "$name" '.featured' "false")
            ordering=$(meta "$name" '.ordering' "0")
            etitle=$(jq -rn --arg v "$title" '$v|@uri')
            qurl="$API/project/$PID/gallery?ext=$ext&featured=$featured&title=$etitle&ordering=$ordering"
            # Modrinth rejects an empty description, so only send the param when set.
            if [ -n "$desc" ]; then
              edesc=$(jq -rn --arg v "$desc" '$v|@uri')
              qurl="$qurl&description=$edesc"
            fi
            echo "Uploading $name (title=\"$title\", featured=$featured, ordering=$ordering)"
            code=$(curl -sS -o resp.txt -w '%{http_code}' -X POST "$qurl" \
              -H "Authorization: $MODRINTH_TOKEN" \
              -H "Content-Type: $(content_type "$ext")" \
              --data-binary "@$file")
            echo "  HTTP $code"
            if [ "$code" != "204" ]; then echo "  $(cat resp.txt)"; echo "::error::upload failed for $name"; exit 1; fi
          done <<< "$sorted"

          echo "Gallery sync complete."
