name: Automated dev builds

on:
  workflow_dispatch:
  push:
    branches:
      - 'ver/**'
      - 'feat/**'

jobs:
  fabric:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build Fabric
        run: ./gradlew -p fabric build

      - name: Publish FABRIC artifacts
        uses: drtheodor/discord-webhook-upload-action@v0.2
        with:
          url: ${{ secrets.DEV_BUILDS }}
          username: FABRIC builds
          avatar: 'https://wiki.tf2classic.com/w/images/b/b3/Engineer_BLU.png'
          message_commit: '> :sparkles: [${commitMessage}](<${commitUrl}>) by [${authorName}](<${authorUrl}>)'
          message_header: |
            <:new1:1253371736510959636><:new2:1253371805734015006> New `${{ github.repository }}` dev build `#${{ github.run_number }}`:
          file: |
            fabric/build/libs/*.jar
            !fabric/build/libs/*-sources.jar
            !fabric/build/libs/*-dev.jar
            !fabric/build/libs/*-javadoc.jar

  forge:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Restore DataGen cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: forge/src/generated
          key: datagen-${{ github.run_id }}
          restore-keys:
            datagen-

      - name: Run DataGen
        run: ./gradlew -p forge Data
        continue-on-error: true

      - name: Save DataGen cache
        uses: actions/cache/save@v4
        with:
          path: forge/src/generated
          key: ${{ steps.cache-restore.outputs.cache-primary-key }}

      - name: Build Forge
        run: ./gradlew -p forge build

      - name: Publish FORGE artifacts
        uses: drtheodor/discord-webhook-upload-action@v0.2
        with:
          url: ${{ secrets.DEV_BUILDS }}
          username: FORGE builds
          avatar: 'https://wiki.tf2classic.com/w/images/b/b3/Engineer_RED.png'
          message_commit: '> :sparkles: [${commitMessage}](<${commitUrl}>) by [${authorName}](<${authorUrl}>)'
          message_header: |
            <:new1:1253371736510959636><:new2:1253371805734015006> New `${{ github.repository }}` dev build `#${{ github.run_number }}`:
          file: |
            forge/build/libs/*.jar
            !forge/build/libs/*-sources.jar
            !forge/build/libs/*-dev.jar
            !forge/build/libs/*-javadoc.jar
